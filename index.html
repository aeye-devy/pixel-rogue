<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pixel Rogue — Dungeon Crawler</title>
    <meta name="description" content="Grid-based roguelike dungeon crawler with pixel art. Navigate dungeons, fight monsters, collect loot." />
    <meta name="theme-color" content="#1a1a2e" />
    <!-- Open Graph -->
    <meta property="og:title" content="Pixel Rogue — Dungeon Crawler" />
    <meta property="og:description" content="Grid-based roguelike dungeon crawler with pixel art. Navigate dungeons, fight monsters, collect loot." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="icon-512.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Pixel Rogue — Dungeon Crawler" />
    <meta name="twitter:description" content="Grid-based roguelike dungeon crawler with pixel art." />
    <meta name="twitter:image" content="icon-512.png" />
    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
      #game-root {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <div id="game-root">
      <canvas id="game-canvas"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
